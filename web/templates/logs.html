<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Logs - Webhook Service</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>🔗 Webhook Service</h1>
            </div>
            <div class="nav-links">
                <a href="/ui/subscriptions" class="nav-link">Subscriptions</a>
                <a href="/ui/subscriptions/new" class="nav-link">New Subscription</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <div class="header-content">
                <h2>📊 Delivery Logs</h2>
                <p>Subscription: <span class="subscription-id">{{.SubscriptionID}}</span></p>
            </div>
            <a href="/ui/subscriptions" class="btn btn-secondary">← Back to Subscriptions</a>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>Recent Delivery Attempts</h3>
                <button onclick="fetchLogs()" class="btn btn-primary btn-sm">🔄 Refresh</button>
            </div>
            <div class="logs-container">
                <div class="table-responsive">
                    <table class="modern-table">
                        <thead>
                            <tr>
                                <th>Task ID</th>
                                <th>Status</th>
                                <th>Timestamp</th>
                                <th>Attempt</th>
                                <th>Outcome</th>
                                <th>HTTP Status</th>
                                <th>Error Details</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Logs will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script>
function fetchLogs() {
    fetch('/api/subscriptions/{{.SubscriptionID}}/logs')
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(logs => {
            const tbody = document.getElementById('logs-body');
            tbody.innerHTML = ''; 
            if (!logs || logs.length === 0) {
                const tr = tbody.insertRow();
                const td = tr.insertCell();
                td.colSpan = 7; 
                td.className = 'empty-state';
                td.innerHTML = '<div class="empty-message">📭 No delivery logs found for this subscription.</div>';
                return;
            }
            logs.forEach(log => {
                const tr = tbody.insertRow();
                
                // Task ID
                const taskCell = tr.insertCell();
                taskCell.innerHTML = `<code class="task-id">${log.delivery_task_id || 'N/A'}</code>`;
                
                // Status
                const statusCell = tr.insertCell();
                statusCell.innerHTML = `<span class="status-badge status-${(log.outcome || 'unknown').toLowerCase()}">${log.outcome || 'Unknown'}</span>`;
                
                // Timestamp
                const timeCell = tr.insertCell();
                const date = new Date(log.timestamp);
                timeCell.innerHTML = `<span class="timestamp">${date.toLocaleString()}</span>`;
                
                // Attempt
                const attemptCell = tr.insertCell();
                attemptCell.innerHTML = `<span class="attempt-number">${log.attempt_number || 0}</span>`;
                
                // Outcome
                const outcomeCell = tr.insertCell();
                const outcomeIcon = log.outcome === 'success' ? '✅' : 
                                  log.outcome === 'failed_attempt' ? '⚠️' : '❌';
                outcomeCell.innerHTML = `<span class="outcome">${outcomeIcon} ${log.outcome || 'Unknown'}</span>`;
                
                // HTTP Status
                const httpCell = tr.insertCell();
                if (log.http_status && log.http_status !== 0) {
                    const statusClass = log.http_status >= 200 && log.http_status < 300 ? 'success' : 'error';
                    httpCell.innerHTML = `<span class="http-status status-${statusClass}">${log.http_status}</span>`;
                } else {
                    httpCell.innerHTML = '<span class="http-status">-</span>';
                }
                
                // Error Details
                const errorCell = tr.insertCell();
                if (log.error_details) {
                    errorCell.innerHTML = `<span class="error-details" title="${log.error_details}">${log.error_details.length > 50 ? log.error_details.substring(0, 50) + '...' : log.error_details}</span>`;
                } else {
                    errorCell.innerHTML = '<span class="no-error">-</span>';
                }
            });
        })
        .catch(error => {
            console.error('Error fetching logs:', error);
            const tbody = document.getElementById('logs-body');
            tbody.innerHTML = '<tr><td colspan="7" class="error-state">❌ Error loading logs: ' + error.message + '</td></tr>';
        });
}

// Auto-refresh logs every 30 seconds
setInterval(fetchLogs, 30000);

// Load logs when page loads
document.addEventListener('DOMContentLoaded', fetchLogs);

</script>
</body>
</html>
